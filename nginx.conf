# ═══════════════════════════════════════════════════════════
# AI Prompt Engineering Hub — NGINX Production Configuration
# ═══════════════════════════════════════════════════════════
# Copy this to /etc/nginx/sites-available/aiprompt.hub
# sudo ln -s /etc/nginx/sites-available/aiprompt.hub /etc/nginx/sites-enabled/
# sudo certbot --nginx -d aipromptloops.me -d www.aipromptloops.me
# sudo nginx -t && sudo systemctl reload nginx

# ── Rate Limiting Zones ──────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=connlimit:10m;

# ── Upstreams (PM2 cluster) ──────────────────────────────
upstream backend_api {
    least_conn;
    server 127.0.0.1:5000;
    # Add more instances if scaling horizontally:
    # server 127.0.0.1:5001;
    # server 127.0.0.1:5002;
    keepalive 64;
}

# ── HTTP → HTTPS Redirect ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name aipromptloops.me www.aipromptloops.me;

    # Allow ACME challenge for Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS Server Block ──────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aipromptloops.me www.aipromptloops.me;

    # ── SSL Configuration (Certbot managed) ───────────────
    ssl_certificate /etc/letsencrypt/live/aipromptloops.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aipromptloops.me/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # ── Security Headers ──────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Root — Serve React Build ──────────────────────────
    root /var/www/aiprompt-hub/frontend/dist;
    index index.html;

    # ── Gzip Compression ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 256;

    # ── Static Asset Caching (CDN-ready) ──────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }

    location ~* \.(js|css|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── SEO Files (root-level) ────────────────────────────
    location = /sitemap.xml {
        proxy_pass http://backend_api/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_valid 200 12h;
    }

    location = /robots.txt {
        proxy_pass http://backend_api/robots.txt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_valid 200 24h;
    }

    # IndexNow key verification file
    location ~* ^/[a-f0-9]{32}\.txt$ {
        root /var/www/aiprompt-hub/frontend/dist;
    }

    # ── API Proxy → Node.js backend ──────────────────────
    location /api/ {
        # Rate limiting
        limit_req zone=api burst=20 nodelay;
        limit_conn connlimit 20;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Hide server details
        proxy_hide_header X-Powered-By;
    }

    # ── Stricter login rate limit ─────────────────────────
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    # ── Uploaded files ────────────────────────────────────
    location /uploads/ {
        alias /var/www/aiprompt-hub/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff";
    }

    # ── SPA Fallback (React Router support) ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block sensitive files ─────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* (\.env|\.git|\.bak|\.sql|\.log|\.sh)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Error Pages ───────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ── Access & Error Logs ───────────────────────────────
    access_log /var/log/nginx/aiprompt-access.log;
    error_log /var/log/nginx/aiprompt-error.log;
}
