<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta -->
    <title>AI Prompt Loops — Master AI Prompts for ChatGPT, Claude & More</title>
    <meta
      name="description"
      content="AI Prompt Loops — Discover, create, and master AI prompts for ChatGPT, Midjourney, Claude, and more. Browse curated prompt templates and tools."
    />
    <meta
      name="keywords"
      content="AI prompts, prompt engineering, ChatGPT prompts, Midjourney prompts, AI tools, Claude prompts, prompt templates"
    />
    <meta name="author" content="AI Prompt Loops" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://aipromptloops.me/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aipromptloops.me/" />
    <meta property="og:title" content="AI Prompt Loops — Master AI Prompts" />
    <meta
      property="og:description"
      content="The ultimate AI prompt engineering resource. Browse, copy, and use handcrafted prompts for ChatGPT, Midjourney, Claude, and more."
    />
    <meta property="og:image" content="https://aipromptloops.me/og-image.png" />
    <meta property="og:site_name" content="AI Prompt Loops" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Prompt Loops" />
    <meta
      name="twitter:description"
      content="Discover and master AI prompts for ChatGPT, Midjourney, Claude, and more."
    />
    <meta name="twitter:image" content="https://aipromptloops.me/og-image.png" />

    <!-- JSON-LD Structured Data (WebSite + Organization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AI Prompt Loops",
      "url": "https://aipromptloops.me",
      "description": "Discover, create, and master AI prompts for ChatGPT, Midjourney, Claude, and more.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://aipromptloops.me/prompts?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AI Prompt Loops",
      "url": "https://aipromptloops.me",
      "logo": "https://aipromptloops.me/logo.png",
      "sameAs": []
    }
    </script>

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google AdSense (lazy initialization built into AdBlock components) -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
